<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="아무 말 대잔치 게시글 목록" />
    <title>아무 말 대잔치 | 게시글 목록</title>
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components/button.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/components/post-card.css" />
    <link rel="stylesheet" href="../../css/components/state.css" />
    <link rel="stylesheet" href="../../css/components/modal.css" />
    <link rel="stylesheet" href="../../css/pages/post-list.css" />
  </head>
  <body class="article-page" data-api-base="">
    <a class="skip-link" href="#article-list">본문으로 건너뛰기</a>
    <header class="site-header">
      <nav class="site-header__inner" aria-label="주요 메뉴">
        <a class="site-logo" href="../../index.html" aria-label="아무 말 대잔치 홈">아무 말 대잔치</a>
        <div class="user-menu" data-account-menu>
          <button class="user-menu__trigger" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false" aria-controls="account-menu-list" data-account-menu-trigger>
            <img src="../../assets/images/default-profile.svg" alt="" />
          </button>
          <div id="account-menu-list" class="user-menu__list" data-account-menu-list hidden>
            <a href="../user/profile-edit.html">회원정보수정</a>
            <a href="../user/password-edit.html">비밀번호수정</a>
            <a href="../auth/login.html">로그아웃</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="page-main">
      <section class="article-intro" aria-labelledby="page-title">
        <h1 id="page-title">안녕하세요,<br />아무 말 대잔치 <strong>게시판</strong> 입니다.</h1>
        <a class="button button--primary" href="./create.html">게시글 작성</a>
      </section>

      <section id="article-list" class="article-feed is-loading" aria-labelledby="article-list-title" aria-live="polite">
        <h2 id="article-list-title" class="sr-only">게시글 목록</h2>
        <div class="article-feed__content" data-list-content></div>
        <div class="skeleton-list" data-skeleton aria-label="게시글을 불러오는 중">
          <div class="article-card article-card--skeleton"><span></span><span></span><span></span></div>
          <div class="article-card article-card--skeleton"><span></span><span></span><span></span></div>
          <div class="article-card article-card--skeleton"><span></span><span></span><span></span></div>
        </div>
        <div class="feed-message feed-message--empty" data-empty hidden><p>빈 게시글</p><span>아직 작성된 게시글이 없어요.</span></div>
        <div class="feed-message feed-message--error" data-error hidden><p>게시글을 불러오지 못했어요.</p><button class="button button--secondary" type="button" data-retry>다시 시도</button></div>
        <div class="feed-loading-more" data-loading-more hidden>게시글을 더 불러오는 중…</div>
        <div class="scroll-sentinel" data-scroll-sentinel aria-hidden="true"></div>
      </section>
    </main>

    <dialog class="modal" id="confirm-modal" aria-labelledby="modal-title">
      <form class="modal__content" method="dialog"><h2 id="modal-title">확인</h2><p>이 작업을 계속할까요?</p><div class="modal__actions"><button class="button button--secondary" value="cancel">취소</button><button class="button button--primary" value="confirm">확인</button></div></form>
    </dialog>
    <script type="module" src="../../js/common/account-menu.js"></script>
    <script type="module" src="../../js/pages/post-list.js"></script>
  </body>
</html>
