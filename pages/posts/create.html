<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="하비루프 취미 이야기 작성" />
    <title>글쓰기 | 하비루프</title>
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components/button.css" />
    <link rel="stylesheet" href="../../css/components/form.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/pages/post-create.css" />
  </head>
  <body class="post-create-page" data-api-base="" data-user-id="">
    <a class="skip-link" href="#post-create-main">게시글 작성 폼으로 건너뛰기</a>
    <header class="site-header">
      <nav class="site-header__inner" aria-label="주요 메뉴">
        <a class="post-create-back" href="./list.html" aria-label="게시글 목록으로 돌아가기"><span aria-hidden="true">‹</span></a>
        <a class="site-logo" href="../../index.html" aria-label="하비루프 홈">하비루프</a>
        <div class="user-menu" data-account-menu>
          <button class="user-menu__trigger" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false" aria-controls="account-menu-list" data-account-menu-trigger>
            <img src="../../assets/images/default-profile.svg" alt="" />
          </button>
          <div id="account-menu-list" class="user-menu__list" data-account-menu-list hidden>
            <a href="../user/profile-edit.html">회원정보수정</a>
            <a href="../user/password-edit.html">비밀번호수정</a>
            <a href="../auth/login.html">로그아웃</a>
          </div>
        </div>
      </nav>
    </header>

    <main id="post-create-main" class="post-create-main">
      <section class="post-create-section" aria-labelledby="post-create-title">
        <h1 id="post-create-title" class="post-create-title">취미 이야기 작성</h1>
        <!-- 상태: is-empty, is-valid, is-loading, is-error, is-success, is-limited -->
        <form class="post-create-form is-empty has-no-image" novalidate>
          <div class="post-create-form__fields">
            <div class="form-field form-field--title">
              <label for="post-title">제목*</label>
              <input id="post-title" class="post-create-input" name="title" type="text" maxlength="26" placeholder="제목을 입력해주세요. (최대 26글자)" aria-describedby="title-error" required />
              <p id="title-error" class="post-field-helper" aria-live="polite">*제목을 입력해주세요.</p>
            </div>

            <div class="form-field form-field--content">
              <label for="post-content">내용*</label>
              <textarea id="post-content" class="post-create-textarea" name="content" placeholder="오늘의 취미 이야기를 들려주세요." aria-describedby="content-error" required></textarea>
              <p id="content-error" class="post-field-helper" aria-live="polite">*내용을 입력해주세요.</p>
            </div>
          </div>

          <section class="image-upload-section" aria-labelledby="image-upload-title">
            <h2 id="image-upload-title">이미지</h2>
            <div class="image-upload-control">
              <label class="image-upload-button" for="content-images">파일 선택</label>
              <input id="content-images" type="file" accept="image/*" multiple />
              <span class="image-upload-guide" data-image-guide>파일을 선택해주세요.</span>
            </div>
            <ul class="image-preview-list" data-image-preview-list aria-label="선택한 이미지 미리보기" hidden></ul>
          </section>

          <button class="button button--primary post-create-button is-disabled" type="submit" disabled aria-disabled="true">
            <span class="post-create-button__label">완료</span><span class="post-create-button__spinner" aria-hidden="true"></span>
          </button>
          <p class="post-create-form__error" role="alert" hidden>*제목,내용을 모두 작성해주세요.</p>
          <p class="post-create-form__limited" role="alert" hidden>1분 내 글 3개까지 작성할 수 있습니다. 잠시 후 다시 시도해주세요.</p>
          <p class="post-create-form__success" role="status" aria-live="polite" hidden>게시글 작성에 성공했습니다.</p>
        </form>
      </section>
    </main>
    <script type="module" src="../../js/common/account-menu.js"></script>
    <script type="module" src="../../js/pages/posts/post-form.js"></script>
  </body>
</html>
