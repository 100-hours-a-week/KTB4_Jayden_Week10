<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="아무 말 대잔치 게시글 수정" /><title>게시글 수정 | 아무 말 대잔치</title>
    <link rel="stylesheet" href="../../css/reset.css" /><link rel="stylesheet" href="../../css/variables.css" /><link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components/button.css" /><link rel="stylesheet" href="../../css/components/header.css" /><link rel="stylesheet" href="../../css/pages/post-edit.css" />
  </head>
  <body class="post-edit-page" data-api-base="" data-article-id="1" data-user-id="">
    <a class="skip-link" href="#post-edit-main">게시글 수정 폼으로 건너뛰기</a>
    <header class="site-header">
      <nav class="site-header__inner" aria-label="주요 메뉴">
        <a class="post-edit-back" href="./detail.html?id=1" aria-label="게시글 상세로 돌아가기"><span aria-hidden="true">‹</span></a>
        <a class="site-logo" href="../../index.html" aria-label="아무 말 대잔치 홈">아무 말 대잔치</a>
        <div class="user-menu" data-account-menu>
          <button class="user-menu__trigger" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false" aria-controls="account-menu-list" data-account-menu-trigger>
            <img src="../../assets/images/default-profile.svg" alt="" />
          </button>
          <div id="account-menu-list" class="user-menu__list" data-account-menu-list hidden>
            <a href="../user/profile-edit.html">회원정보수정</a>
            <a href="../user/password-edit.html">비밀번호수정</a>
            <a href="../auth/login.html">로그아웃</a>
          </div>
        </div>
      </nav>
    </header>
    <main id="post-edit-main" class="post-edit-main"><section class="post-edit-section" aria-labelledby="post-edit-title"><h1 id="post-edit-title">게시글 수정</h1>
      <!-- 상태: is-empty, is-valid, is-loading, is-error, is-success, has-image, has-no-image -->
      <form class="post-edit-form is-valid has-image" novalidate>
        <div class="post-edit-form__fields">
          <div class="post-edit-field post-edit-field--title is-filled is-valid"><label for="post-title">제목*</label><input id="post-title" name="title" maxlength="26" value="제목 1" aria-describedby="title-error" required /><p id="title-error" class="post-edit-helper">*제목을 입력해주세요.</p></div>
          <div class="post-edit-field post-edit-field--content is-filled is-valid"><label for="post-content">내용*</label><textarea id="post-content" name="content" aria-describedby="content-error" required>무엇을 얘기할까요? 아무말이라면, 삶은 항상 놀라운 모험이라고 생각합니다. 우리는 매일 새로운 경험을 하고 배우며 성장합니다. 때로는 어려움과 도전이 있지만, 그것들이 우리를 더 강하고 지혜롭게 만듭니다.
자연도 아름다운 이야기입니다. 우리 주변의 자연은 끝없는 아름다움과 신비로움을 담고 있습니다. 산, 바다, 숲, 하늘 등 모든 것이 우리를 놀라게 만들고 감동시킵니다.</textarea><p id="content-error" class="post-edit-helper">*내용을 입력해주세요.</p></div>
        </div>
        <section class="post-edit-images" aria-labelledby="image-title"><h2 id="image-title">이미지</h2><div class="post-edit-image-control"><label for="content-images">파일 선택</label><input id="content-images" type="file" accept="image/*" multiple /><span data-image-guide>기존 파일명</span></div><ul data-image-list aria-label="기존 및 새 이미지"><li class="existing-image"><img src="../../assets/images/empty-posts.svg" alt="기존 게시글 이미지" data-fallback-src="../../assets/images/empty-posts.svg" /><small>기존 파일명.jpg</small></li></ul></section>
        <button class="button button--primary post-edit-button" type="submit"><span data-submit-label>수정하기</span><span class="post-edit-spinner" aria-hidden="true"></span></button><p class="post-edit-error" role="alert" hidden>*제목,내용을 모두 작성해주세요.</p><p class="post-edit-success" role="status" aria-live="polite" hidden>게시글 수정에 성공했습니다.</p>
      </form>
    </section></main>
    <script type="module" src="../../js/common/account-menu.js"></script>
    <script type="module" src="../../js/pages/post-edit.js"></script>
  </body>
</html>
