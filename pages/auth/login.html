<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="아무 말 대잔치 로그인" />
    <title>로그인 | 아무 말 대잔치</title>
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components/button.css" />
    <link rel="stylesheet" href="../../css/components/form.css" />
    <link rel="stylesheet" href="../../css/pages/login.css" />
  </head>
  <body class="login-page">
    <a class="skip-link" href="#login-main">로그인 폼으로 건너뛰기</a>

    <header class="login-header">
      <nav class="login-header__inner" aria-label="주요 메뉴">
        <a class="login-logo" href="../../index.html" aria-label="아무 말 대잔치 홈">아무 말 대잔치</a>
      </nav>
    </header>

    <main id="login-main" class="login-main">
      <!-- 상태: is-valid, is-loading, is-error, is-success. API 연결 시 form에 한 가지 상태를 적용합니다. -->
      <section class="login-section" aria-labelledby="login-title">
        <h1 id="login-title" class="login-title">로그인</h1>
        <form class="login-form" action="../posts/list.html" method="get" novalidate>
          <div class="login-form__fields">
            <!-- 상태: is-focused, is-filled, is-invalid, is-valid, is-required -->
            <div class="form-field form-field--email">
              <label for="email">이메일</label>
              <input id="email" class="text-input login-input" name="email" type="email" placeholder="이메일을 입력하세요" autocomplete="email" aria-describedby="email-required-error email-format-error" required />
              <p id="email-required-error" class="form-field__error form-field__error--required">*이메일을 입력해주세요</p>
              <p id="email-format-error" class="form-field__error form-field__error--format">*올바른 이메일 주소 형식을 입력해주세요. (예: jayden@abc.com)</p>
            </div>

            <div class="form-field form-field--password">
              <label for="password">비밀번호</label>
              <input id="password" class="text-input login-input" name="password" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" aria-describedby="password-required-error password-format-error login-error" required />
              <p id="password-required-error" class="form-field__error form-field__error--required">*비밀번호를 입력해주세요</p>
              <p id="password-format-error" class="form-field__error form-field__error--format">*비밀번호는 8자 이상, 20자 이하이며, 대문자, 소문자, 숫자, 특수문자를 각각 최소 1개 포함해야 합니다.</p>
              <p id="login-error" class="form-field__error form-field__error--login">*아이디 또는 비밀번호를 확인해주세요</p>
            </div>
          </div>

          <!-- 기본 상태는 disabled입니다. 유효성 통과 뒤 disabled 제거 및 .is-valid 적용이 필요합니다. -->
          <button class="button button--primary login-button is-disabled" type="submit" disabled aria-disabled="true">
            <span class="login-button__label">로그인</span>
            <span class="login-button__spinner" aria-hidden="true"></span>
          </button>
        </form>
        <a class="signup-link" href="./signup.html">회원가입</a>
      </section>
    </main>

    <script type="module" src="../../js/pages/auth/login.js"></script>
  </body>
</html>
