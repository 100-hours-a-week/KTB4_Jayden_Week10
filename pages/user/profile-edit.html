<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="하비루프 회원정보수정" />
    <title>회원정보수정 | 하비루프</title>
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components/button.css" />
    <link rel="stylesheet" href="../../css/components/form.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/components/modal.css" />
    <link rel="stylesheet" href="../../css/components/toast.css" />
    <link rel="stylesheet" href="../../css/pages/profile-edit.css" />
  </head>
  <body class="profile-edit-page" data-api-base="" data-user-id="">
    <a class="skip-link" href="#profile-edit-main">회원정보수정 폼으로 건너뛰기</a>
    <header class="site-header">
      <nav class="site-header__inner" aria-label="주요 메뉴">
        <a class="site-logo" href="../../index.html" aria-label="하비루프 홈">하비루프</a>
        <div class="user-menu" data-account-menu>
          <button class="user-menu__trigger" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false" aria-controls="account-menu-list" data-account-menu-trigger>
            <img src="../../assets/images/default-profile.svg" alt="" />
          </button>
          <div id="account-menu-list" class="user-menu__list" data-account-menu-list hidden>
            <a href="../user/profile-edit.html">회원정보수정</a>
            <a href="../user/password-edit.html">비밀번호수정</a>
            <a href="../auth/login.html">로그아웃</a>
          </div>
        </div>
      </nav>
    </header>

    <main id="profile-edit-main" class="profile-edit-main">
      <section class="profile-edit-section" aria-labelledby="profile-edit-title">
        <h1 id="profile-edit-title" class="profile-edit-title">회원정보수정</h1>
        <!-- 상태: is-loading, is-error, is-success, is-valid. -->
        <form class="profile-edit-form is-valid" novalidate>
          <div class="profile-image-field is-valid">
            <span class="profile-image-field__label">프로필 사진</span>
            <label class="profile-image-upload has-image" for="profile-image" aria-label="프로필 사진 변경">
              <img class="profile-image-upload__preview" src="../../assets/images/default-profile.svg" alt="현재 프로필 사진" data-profile-image-preview data-fallback-src="../../assets/images/default-profile.svg" />
              <span class="profile-image-upload__change">변경</span>
              <span class="profile-image-upload__plus" aria-hidden="true">+</span>
            </label>
            <input id="profile-image" class="profile-image-upload__input" type="file" accept="image/*" />
          </div>

          <div class="profile-edit-form__fields">
            <div class="profile-email">
              <span class="profile-email__label">이메일</span>
              <p aria-labelledby="profile-email-label" data-profile-email aria-live="polite">이메일 정보를 불러오는 중입니다.</p>
            </div>
            <!-- 상태: is-empty, is-filled, is-focused, is-invalid, is-valid, is-duplicate -->
            <div class="form-field form-field--nickname is-filled is-valid">
              <label for="nickname">닉네임</label>
              <input id="nickname" class="text-input profile-edit-input" name="nickname" type="text" value="스타트업코드" autocomplete="nickname" aria-describedby="nickname-required-error nickname-duplicate-error nickname-max-error nickname-success" required />
              <div class="profile-field-helper" aria-live="polite">
                <p id="nickname-required-error" class="profile-field-helper__message profile-field-helper__message--required">*닉네임을 입력해주세요.</p>
                <p id="nickname-duplicate-error" class="profile-field-helper__message profile-field-helper__message--duplicate">*중복된 닉네임입니다.</p>
                <p id="nickname-max-error" class="profile-field-helper__message profile-field-helper__message--max">*닉네임은 최대 10자까지 작성 가능합니다.</p>
                <p id="nickname-success" class="profile-field-helper__message profile-field-helper__message--success">*사용 가능한 닉네임입니다.</p>
              </div>
            </div>
          </div>

          <button class="button button--primary profile-save-button" type="submit">
            <span class="profile-save-button__label">수정하기</span><span class="profile-save-button__spinner" aria-hidden="true"></span>
          </button>
          <p class="profile-edit-form__error" role="alert">회원정보를 수정하지 못했습니다. 잠시 후 다시 시도해주세요.</p>
        </form>
        <button class="withdraw-link" type="button" data-withdraw-open>회원 탈퇴</button>
      </section>
    </main>

    <dialog class="modal withdraw-modal" id="withdraw-modal" aria-labelledby="withdraw-title" aria-describedby="withdraw-description">
      <form class="modal__content" method="dialog">
        <h2 id="withdraw-title">회원탈퇴 하시겠습니까?</h2>
        <p id="withdraw-description">작성된 게시글과 댓글은 삭제됩니다.</p>
        <div class="modal__actions">
          <button class="button button--secondary" value="cancel">취소</button>
          <button class="button button--primary" value="confirm" data-withdraw-confirm>확인</button>
        </div>
      </form>
    </dialog>
    <div class="toast profile-toast" role="status" aria-live="polite" hidden>수정완료</div>
    <script type="module" src="../../js/common/account-menu.js"></script>
    <script type="module" src="../../js/pages/user/profile-edit.js"></script>
  </body>
</html>
