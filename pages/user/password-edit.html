<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="하비루프 비밀번호 수정" />
    <title>비밀번호 수정 | 하비루프</title>
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components/button.css" />
    <link rel="stylesheet" href="../../css/components/form.css" />
    <link rel="stylesheet" href="../../css/components/header.css" />
    <link rel="stylesheet" href="../../css/components/toast.css" />
    <link rel="stylesheet" href="../../css/pages/password-edit.css" />
  </head>
  <body class="password-edit-page" data-api-base="" data-user-id="">
    <a class="skip-link" href="#password-edit-main">비밀번호 수정 폼으로 건너뛰기</a>
    <header class="site-header">
      <nav class="site-header__inner" aria-label="주요 메뉴">
        <a class="site-logo" href="../../index.html" aria-label="하비루프 홈">하비루프</a>
        <div class="user-menu" data-account-menu>
          <button class="user-menu__trigger" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false" aria-controls="account-menu-list" data-account-menu-trigger>
            <img src="../../assets/images/default-profile.svg" alt="" data-profile-image />
          </button>
          <div id="account-menu-list" class="user-menu__list" data-account-menu-list hidden>
            <a href="../user/profile-edit.html">회원정보수정</a>
            <a href="../user/password-edit.html">비밀번호수정</a>
            <a logout-a>로그아웃</a>
          </div>
        </div>
      </nav>
    </header>

    <main id="password-edit-main" class="password-edit-main">
      <section class="password-edit-section" aria-labelledby="password-edit-title">
        <h1 id="password-edit-title" class="password-edit-title">비밀번호 수정</h1>
        <!-- 상태: is-loading, is-error, is-success, is-valid. -->
        <form class="password-edit-form" novalidate>
          <div class="password-edit-form__fields">
            <!-- 상태: is-empty, is-filled, is-focused, is-invalid, is-valid -->
            <div class="form-field form-field--password">
              <label for="password">비밀번호</label>
              <input id="password" class="text-input password-edit-input" name="password" type="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" aria-describedby="password-required-error password-format-error password-mismatch-error password-success" required />
              <div class="password-field-helper" aria-live="polite">
                <p id="password-required-error" class="password-field-helper__message password-field-helper__message--required">*비밀번호를 입력해주세요</p>
                <p id="password-format-error" class="password-field-helper__message password-field-helper__message--format">*비밀번호는 8자 이상, 20자 이하이며, 대문자, 소문자, 숫자, 특수문자를 각각 최소 1개 포함해야 합니다.</p>
                <p id="password-mismatch-error" class="password-field-helper__message password-field-helper__message--mismatch">*비밀번호 확인과 다릅니다.</p>
                <p id="password-success" class="password-field-helper__message password-field-helper__message--success">*사용 가능한 비밀번호입니다.</p>
              </div>
            </div>

            <div class="form-field form-field--password-confirm">
              <label for="password-confirm">비밀번호 확인</label>
              <input id="password-confirm" class="text-input password-edit-input" name="passwordConfirm" type="password" placeholder="비밀번호를 한번 더 입력하세요" autocomplete="new-password" aria-describedby="password-confirm-required-error password-confirm-mismatch-error password-confirm-success" required />
              <div class="password-field-helper" aria-live="polite">
                <p id="password-confirm-required-error" class="password-field-helper__message password-field-helper__message--required">*비밀번호를 한번 더 입력해주세요</p>
                <p id="password-confirm-mismatch-error" class="password-field-helper__message password-field-helper__message--mismatch">*비밀번호와 다릅니다.</p>
                <p id="password-confirm-success" class="password-field-helper__message password-field-helper__message--success">*비밀번호가 일치합니다.</p>
              </div>
            </div>
          </div>

          <button class="button button--primary password-save-button is-disabled" type="submit" disabled aria-disabled="true">
            <span class="password-save-button__label">수정하기</span><span class="password-save-button__spinner" aria-hidden="true"></span>
          </button>
          <p class="password-edit-form__error" role="alert" hidden>비밀번호를 수정하지 못했습니다. 다시 시도해주세요.</p>
        </form>
      </section>
    </main>
    <div class="toast password-toast" role="status" aria-live="polite" hidden>수정완료</div>
    <script type="module" src="../../js/common/account-menu.js"></script>
    <script type="module" src="../../js/pages/user/password-edit.js"></script>
  </body>
</html>
